<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的書架</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9f9f7;color:#1a1a1a;min-height:100vh}
.app{padding:1.5rem 1rem;max-width:760px;margin:0 auto}
.nav{display:flex;align-items:center;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid #e5e5e2;padding-bottom:0;flex-wrap:wrap}
.nav-btn{font-size:14px;padding:8px 16px;border:none;background:transparent;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.nav-btn.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:500}
.nav-spacer{flex:1}
.nav-io-btn{font-size:12px;padding:5px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#666;margin-bottom:4px;white-space:nowrap}
.nav-io-btn:hover{background:#f0f0ee}
.sync-status{font-size:11px;padding:4px 10px;border-radius:999px;margin-bottom:4px;white-space:nowrap}
.sync-ok{background:#EAF3DE;color:#3B6D11}
.sync-ing{background:#E6F1FB;color:#185FA5}
.sync-err{background:#FCEBEB;color:#A32D2D}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.topbar input{font-size:14px;flex:1;min-width:160px;padding:7px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a}
.topbar button{flex-shrink:0;font-size:13px;padding:7px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;color:#1a1a1a}
.topbar button:hover{background:#f0f0ee}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.stat{background:#f0f0ee;border-radius:8px;padding:10px 12px;text-align:center}
.stat-num{font-size:20px;font-weight:500}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.filter-section{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-label{font-size:11px;color:#aaa;min-width:28px;flex-shrink:0}
.filter-btn{font-size:12px;padding:3px 10px;border:1px solid #ddd;border-radius:999px;background:#fff;cursor:pointer;color:#666}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.rating-btn{font-size:12px;padding:3px 10px;border:1px solid #ddd;border-radius:999px;background:#fff;cursor:pointer;color:#BA7517}
.rating-btn.active{background:#BA7517;color:#fff;border-color:#BA7517}
.tag-filter{font-size:12px;padding:3px 10px;border:1px solid #ddd;border-radius:999px;background:#fff;cursor:pointer;color:#666}
.tag-filter.active{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.booklist{display:flex;flex-direction:column;gap:8px}
.book-card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;overflow:hidden;transition:border-color 0.15s}
.book-card:hover{border-color:#ccc}
.book-inner{display:flex;cursor:pointer}
.book-cover{width:64px;min-height:90px;flex-shrink:0;background:#f0f0ee;display:flex;align-items:center;justify-content:center;overflow:hidden}
.book-cover img{width:100%;height:100%;object-fit:cover}
.cover-ph{font-size:22px;color:#bbb}
.book-body{flex:1;min-width:0;padding:10px 12px}
.row1,.row2,.row3{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.row2{margin-top:3px}.row3{margin-top:3px}
.book-title{font-size:14px;font-weight:500;color:#1a1a1a}
.book-sub{font-size:12px;color:#888}
.sep{font-size:12px;color:#ccc}
.badge{font-size:11px;padding:2px 7px;border-radius:999px;font-weight:500;white-space:nowrap}
.b-pending{background:#F1EFE8;color:#5F5E5A}
.b-reading{background:#E6F1FB;color:#185FA5}
.b-done{background:#EAF3DE;color:#3B6D11}
.b-dropped{background:#FCEBEB;color:#A32D2D}
.b-digital{background:#FAEEDA;color:#854F0B}
.b-physical{background:#EEEDFE;color:#3C3489}
.b-date{background:#FBEAF0;color:#72243E}
.b-tag{background:#EEEDFE;color:#534AB7}
.b-loc{background:#E1F5EE;color:#0F6E56}
.b-noted{background:#EAF3DE;color:#3B6D11}
.b-noting{background:#E6F1FB;color:#185FA5}
.b-writing{background:#E6F1FB;color:#185FA5}
.b-pending-note{background:#F1EFE8;color:#5F5E5A}
.stars{font-size:12px;color:#BA7517}
.expand-area{border-top:1px solid #f0f0ee;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.detail-grid{display:grid;grid-template-columns:70px 1fr;gap:3px 8px;font-size:12px}
.detail-grid .lbl{color:#aaa}
.detail-grid .val{color:#1a1a1a}
.book-note{font-size:13px;color:#888;line-height:1.6}
.expand-actions{display:flex;justify-content:flex-end}
.expand-actions button{font-size:12px;padding:3px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#666}
.add-btn{width:100%;margin-top:10px;padding:10px;font-size:14px;border:1px dashed #ccc;border-radius:12px;background:transparent;cursor:pointer;color:#888}
.add-btn:hover{background:#f5f5f3}
.db-section{margin-bottom:1.5rem}
.db-title{font-size:12px;font-weight:500;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.db-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.db-card{background:#f0f0ee;border-radius:8px;padding:12px;text-align:center}
.db-num{font-size:22px;font-weight:500}
.db-lbl{font-size:11px;color:#888;margin-top:2px}
.chart-card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:16px}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:12px;color:#888}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.goal-card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:16px;margin-bottom:12px}
.goal-bar-track{height:10px;background:#f0f0ee;border-radius:999px;overflow:hidden;margin:10px 0 6px}
.goal-bar-fill{height:100%;border-radius:999px;background:#3B6D11;transition:width .4s}
.goal-labels{display:flex;justify-content:space-between;font-size:12px;color:#888}
.year-tab,.status-tab{font-size:12px;padding:3px 10px;border:1px solid #ddd;border-radius:999px;background:#fff;cursor:pointer;color:#666}
.year-tab.active,.status-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding-top:40px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.25rem;width:min(460px,94vw);border:1px solid #e8e8e5;max-height:85vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1rem}
.field{margin-bottom:10px}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a}
.field textarea{height:72px;resize:vertical}
.field-hint{font-size:11px;color:#aaa;margin-top:3px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 8px}
.chip-input-row{display:flex;gap:6px}
.chip-input-row input{flex:1}
.chip-input-row button{flex-shrink:0;padding:6px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.chip{font-size:12px;padding:2px 8px;border-radius:999px;display:flex;align-items:center;gap:4px}
.chip-tag{background:#EEEDFE;color:#534AB7}
.chip-loc{background:#E1F5EE;color:#0F6E56}
.chip .rm{font-size:14px;line-height:1;opacity:.5;cursor:pointer}
.ms-wrap{border:1px solid #ddd;border-radius:8px;background:#fff;padding:6px 8px;min-height:36px;cursor:text}
.ms-wrap:focus-within{border-color:#aaa}
.ms-selected{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.ms-input-row{display:flex;gap:6px}
.ms-input-row input{flex:1;border:none;outline:none;font-size:14px;padding:2px 0;background:transparent;color:#1a1a1a;min-width:80px}
.ms-dropdown{border:1px solid #ddd;border-radius:8px;background:#fff;margin-top:3px;overflow:hidden;display:none}
.ms-dropdown.open{display:block}
.ms-opt{font-size:13px;padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;color:#1a1a1a}
.ms-opt:hover{background:#f5f5f3}
.ms-opt.selected{color:#534AB7}
.ms-opt-check{width:14px;height:14px;border:1.5px solid #ddd;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.ms-opt.selected .ms-opt-check{background:#534AB7;border-color:#534AB7;color:#fff}
.ms-add-row{font-size:13px;padding:7px 10px;cursor:pointer;color:#888;border-top:1px solid #f0f0ee;display:none}
.ms-add-row:hover{background:#f5f5f3}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.modal-actions button{padding:7px 14px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer}
.modal-actions .btn-save{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.cover-preview{width:50px;height:68px;object-fit:cover;border-radius:4px;border:1px solid #ddd;margin-top:6px}
.row-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.empty,.loading{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:8px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="nav-btn active" id="navShelf" onclick="showTab('shelf')">書架</button>
    <button class="nav-btn" id="navDash" onclick="showTab('dash')">統計儀表板</button>
    <div class="nav-spacer"></div>
    <span class="sync-status sync-ing" id="syncStatus">連線中…</span>
    <button class="nav-io-btn" onclick="exportData()">匯出</button>
    <label class="nav-io-btn" style="cursor:pointer">匯入<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    <button class="nav-io-btn" onclick="signOut()" id="signOutBtn" style="display:none">登出</button>
  </div>

  <!-- 登入畫面 -->
  <div id="loginScreen" style="display:none;text-align:center;padding:4rem 1rem">
    <div style="font-size:28px;margin-bottom:12px">📚</div>
    <div style="font-size:18px;font-weight:500;margin-bottom:8px;color:#1a1a1a">我的書架</div>
    <div style="font-size:14px;color:#888;margin-bottom:2rem">請登入以存取你的書單</div>
    <button onclick="signInWithGoogle()" style="display:inline-flex;align-items:center;gap:10px;padding:10px 20px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;color:#1a1a1a">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
      使用 Google 帳號登入
    </button>
    <div id="loginError" style="font-size:13px;color:#A32D2D;margin-top:1rem;display:none"></div>
  </div>

  <div id="tabShelf">
    <div class="topbar">
      <input type="text" placeholder="搜尋書名、作者、ISBN..." id="searchInput" oninput="render()">
      <button onclick="openModal()">+ 新增書籍</button>
    </div>
    <div class="stats" id="statsRow"></div>
    <div class="filter-section">
      <div class="filter-row" id="filterRow"></div>
      <div class="filter-row" id="ratingFilterRow"></div>
      <div class="filter-row" id="locFilterRow"></div>
      <div class="filter-row" id="tagFilterRow"></div>
    </div>
    <div class="booklist" id="booklist"><div class="loading">連線 Firebase 中…</div></div>
    <button class="add-btn" onclick="openModal()">+ 新增一本書</button>
  </div>

  <div id="tabDash" style="display:none">
    <div class="db-section">
      <div class="db-title">總覽</div>
      <div class="db-cards" id="dbCards"></div>
    </div>
    <div class="db-section">
      <div class="db-title">年度目標</div>
      <div id="goalSection"></div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap">
        <input type="number" id="newGoalYear" placeholder="年份" style="width:80px;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:8px" min="2000" max="2099">
        <input type="number" id="newGoalTarget" placeholder="目標本數" style="width:90px;font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:8px" min="1">
        <button onclick="addGoalYear()" style="font-size:13px;padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer">新增年份</button>
      </div>
    </div>
    <div class="db-section">
      <div class="db-title">類別分佈</div>
      <div class="chart-card">
        <div class="row-tabs" id="pieStatusTabs"></div>
        <div class="chart-legend" id="pieLegend"></div>
        <div style="position:relative;height:220px"><canvas id="pieChart"></canvas></div>
      </div>
    </div>
    <div class="db-section">
      <div class="db-title">每月閱讀數量（已讀）</div>
      <div class="chart-card">
        <div class="row-tabs" id="barYearTabs"></div>
        <div style="position:relative;height:200px"><canvas id="barChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px">
      <h2 id="modalTitle" style="margin:0">新增書籍</h2>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button onclick="closeModal()" style="font-size:13px;padding:5px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#666">取消</button>
        <button class="btn-save" onclick="saveBook()" style="font-size:13px;padding:5px 12px">儲存</button>
      </div>
    </div>
    <div class="field"><label>書名</label><input id="f-title" type="text" placeholder="例：追風箏的孩子"></div>
    <div class="f2">
      <div class="field"><label>作者</label><input id="f-author" type="text"></div>
      <div class="field"><label>出版年</label><input id="f-year" type="text" placeholder="例：2003"></div>
    </div>
    <div class="f2">
      <div class="field"><label>出版社</label><input id="f-publisher" type="text"></div>
      <div class="field">
        <label>ISBN</label>
        <div style="display:flex;gap:6px">
          <input id="f-isbn" type="text" placeholder="輸入後按 Enter 查詢" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();lookupISBN()}">
          <button onclick="lookupISBN()" id="isbnBtn" style="flex-shrink:0;padding:6px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer">查詢</button>
        </div>
        <div id="isbnStatus" style="font-size:11px;margin-top:4px;min-height:16px"></div>
      </div>
    </div>
    <div class="f2">
      <div class="field"><label>閱讀狀態</label>
        <select id="f-status" onchange="toggleDateField()">
          <option value="pending">待讀</option>
          <option value="reading">閱讀中</option>
          <option value="done">已讀</option>
          <option value="dropped">棄讀</option>
        </select>
      </div>
      <div class="field" id="dateField" style="display:none">
        <label>讀完日期</label><input id="f-date" type="date">
      </div>
    </div>
    <div class="f2">
      <div class="field"><label>筆記狀態</label>
        <select id="f-note-status">
          <option value="">—</option>
          <option value="pending">待筆記</option>
          <option value="noting">筆記中</option>
          <option value="noted">已筆記</option>
        </select>
      </div>
      <div class="field"><label>評分</label>
        <select id="f-rating">
          <option value="0">—</option>
          <option value="1">★</option><option value="2">★★</option><option value="3">★★★</option>
          <option value="4">★★★★</option><option value="5">★★★★★</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>藏書位置</label>
      <div class="ms-wrap" onclick="focusInput('loc-inp')">
        <div class="ms-selected" id="loc-selected"></div>
        <div class="ms-input-row">
          <input id="loc-inp" type="text" placeholder="搜尋或新增地點…" autocomplete="off"
            oninput="renderMsDropdown('loc')" onkeydown="msPressKey(event,'loc')" onfocus="renderMsDropdown('loc')" onblur="setTimeout(()=>closeMsDropdown('loc'),150)">
        </div>
      </div>
      <div class="ms-dropdown" id="loc-dropdown"></div>
    </div>
    <div class="field">
      <label>分類標籤</label>
      <div class="ms-wrap" onclick="focusInput('tag-inp')">
        <div class="ms-selected" id="tag-selected"></div>
        <div class="ms-input-row">
          <input id="tag-inp" type="text" placeholder="搜尋或新增標籤…" autocomplete="off"
            oninput="renderMsDropdown('tag')" onkeydown="msPressKey(event,'tag')" onfocus="renderMsDropdown('tag')" onblur="setTimeout(()=>closeMsDropdown('tag'),150)">
        </div>
      </div>
      <div class="ms-dropdown" id="tag-dropdown"></div>
    </div>
    <div class="field">
      <label>Evernote 筆記連結</label>
      <input id="f-evernote" type="text" placeholder="evernote:///...  或  https://www.evernote.com/...">
      <div style="font-size:11px;color:#aaa;margin-top:3px">在 Evernote 開啟筆記 → 更多 → 複製筆記連結，貼上後即可從書卡直接開啟</div>
    </div>
    <div class="field"><label>短評 & 備註</label><textarea id="f-note" placeholder="簡短記下你的想法…"></textarea></div>
    <div class="field">
      <label>封面圖片</label>
      <input id="f-cover" type="text" placeholder="貼上圖片網址，或點此區域後 Ctrl/Cmd+V 貼上圖片" oninput="previewCover()">
      <div style="font-size:11px;color:#aaa;margin-top:3px">支援直接貼上截圖或複製的圖片，也可以貼網址</div>
      <img id="coverPreview" class="cover-preview" style="display:none;margin-top:6px" alt="封面預覽">
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── Firebase 設定 ───────────────────────────────────────────────
const FB_PROJECT = 'my-bookshelf-a66cb';
const FB_API_KEY = 'AIzaSyCbLjYingxT3-7oWDC_vVJOx33zdwmGBgU';
const FB_BASE    = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/bookshelf/main`;

let currentIdToken = null;
let tokenRefreshTimer = null;

function getFbUrl() {
  return currentIdToken ? `${FB_BASE}` : `${FB_BASE}?key=${FB_API_KEY}`;
}
function getAuthHeaders() {
  const h = {'Content-Type': 'application/json'};
  if (currentIdToken) h['Authorization'] = `Bearer ${currentIdToken}`;
  return h;
}

// ── Google 登入 ─────────────────────────────────────────────────
async function signInWithGoogle() {
  showLoginError('正在載入登入模組…');
  // 動態載入 Firebase Auth compat SDK（僅登入時才載入，減少初始負擔）
  const loadScript = src => new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  try {
    await loadScript('https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js');
    initFirebaseAuth();
  } catch(e) {
    showLoginError('登入模組載入失敗，請確認網路連線後再試。');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

let fbAuthApp = null;
function initFirebaseAuth() {
  if (!fbAuthApp) {
    fbAuthApp = firebase.initializeApp({
      apiKey: FB_API_KEY,
      authDomain: 'my-bookshelf-a66cb.firebaseapp.com',
      projectId: FB_PROJECT
    }, 'auth-app');
  }
  const auth = firebase.auth(fbAuthApp);

  // 自動恢復登入狀態（重新整理頁面後不需再次登入）
  auth.onAuthStateChanged(user => {
    if (user) {
      user.getIdToken().then(token => {
        currentIdToken = token;
        onSignedIn(user.displayName || user.email, token, auth);
      });
    } else {
      // 未登入，顯示登入畫面（已在啟動時處理）
      document.getElementById('loginError').style.display = 'none';
    }
  });

  // 若尚未登入，執行 Google Popup 登入
  if (!auth.currentUser) {
    const provider = new firebase.auth.GoogleAuthProvider();
    document.getElementById('loginError').style.display = 'none';
    auth.signInWithPopup(provider).catch(e => {
      showLoginError('登入失敗：' + (e.message || e.code));
    });
  }
}

function onSignedIn(name, token, auth) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('signOutBtn').style.display = 'inline-block';
  document.getElementById('signOutBtn').title = name;
  // 每 50 分鐘刷新 token（有效期 1 小時）
  tokenRefreshTimer = setInterval(() => {
    const user = auth.currentUser;
    if (user) user.getIdToken(true).then(t => { currentIdToken = t; });
  }, 50 * 60 * 1000);
  loadFromFirebase();
}

function signOut() {
  if (fbAuthApp) {
    firebase.auth(fbAuthApp).signOut().then(() => {
      currentIdToken = null;
      clearInterval(tokenRefreshTimer);
      document.getElementById('signOutBtn').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('tabShelf').style.display = 'none';
      document.getElementById('tabDash').style.display = 'none';
      books = []; goals = {}; goals[THIS_YEAR] = 50;
    });
  }
}

// ── Firestore REST ──────────────────────────────────────────────

// Firestore REST：把 JS 物件轉成 Firestore 格式
function toFS(val) {
  if (val === null || val === undefined) return {nullValue: null};
  if (typeof val === 'boolean') return {booleanValue: val};
  if (typeof val === 'number')  return {integerValue: String(Math.round(val))};
  if (typeof val === 'string')  return {stringValue: val};
  if (Array.isArray(val))       return {arrayValue: {values: val.map(toFS)}};
  if (typeof val === 'object')  return {mapValue: {fields: Object.fromEntries(Object.entries(val).map(([k,v])=>[k,toFS(v)]))}};
  return {stringValue: String(val)};
}

// Firestore REST：把 Firestore 格式轉回 JS 物件
function fromFS(field) {
  if (!field) return null;
  if ('nullValue'    in field) return null;
  if ('booleanValue' in field) return field.booleanValue;
  if ('integerValue' in field) return Number(field.integerValue);
  if ('doubleValue'  in field) return Number(field.doubleValue);
  if ('stringValue'  in field) return field.stringValue;
  if ('arrayValue'   in field) return (field.arrayValue.values || []).map(fromFS);
  if ('mapValue'     in field) return Object.fromEntries(Object.entries(field.mapValue.fields || {}).map(([k,v])=>[k,fromFS(v)]));
  return null;
}

async function fbGet() {
  const url = currentIdToken ? FB_BASE : `${FB_BASE}?key=${FB_API_KEY}`;
  const headers = currentIdToken ? {'Authorization': `Bearer ${currentIdToken}`} : {};
  const res = await fetch(url, {headers});
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`GET ${res.status}`);
  const doc = await res.json();
  return Object.fromEntries(Object.entries(doc.fields || {}).map(([k,v]) => [k, fromFS(v)]));
}

async function fbSet(data) {
  const url = currentIdToken ? FB_BASE : `${FB_BASE}?key=${FB_API_KEY}`;
  const headers = {'Content-Type': 'application/json'};
  if (currentIdToken) headers['Authorization'] = `Bearer ${currentIdToken}`;
  const fields = Object.fromEntries(Object.entries(data).map(([k,v]) => [k, toFS(v)]));
  const res = await fetch(url, {
    method: 'PATCH', headers,
    body: JSON.stringify({fields})
  });
  if (!res.ok) throw new Error(`PATCH ${res.status}: ${await res.text()}`);
}

// ── Firebase 同步 ───────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status sync-' + state;
  el.textContent = msg;
}

let pendingSave = false;

async function saveToFirebase() {
  if (isSaving) { pendingSave = true; return; }
  isSaving = true; pendingSave = false;
  setSyncStatus('ing', '儲存中…');
  try {
    const cleanBooks = books.map(({open, ...rest}) => rest);
    await fbSet({books: cleanBooks, goals, nextId, updatedAt: new Date().toISOString()});
    setSyncStatus('ok', '已同步');
  } catch(e) {
    setSyncStatus('err', '同步失敗');
    console.error(e);
  }
  isSaving = false;
  if (pendingSave) saveToFirebase();
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 2000);
}

async function loadFromFirebase() {
  setSyncStatus('ing', '連線中…');
  document.getElementById('tabShelf').style.display = 'block';
  try {
    const data = await fbGet();
    if (data) {
      books = (data.books || []).map(b => ({...b, open: false}));
      if (data.goals && typeof data.goals === 'object') goals = data.goals;
      if (data.nextId) nextId = data.nextId;
      setSyncStatus('ok', '已同步');
    } else {
      books = [];
      setSyncStatus('ok', '已連線');
    }
  } catch(e) {
    setSyncStatus('err', '連線失敗');
    console.error(e);
    document.getElementById('booklist').innerHTML = '<div class="empty">連線失敗，請確認網路後重新整理</div>';
  }
  render();
  // 每 30 秒自動重新整理（讓其他裝置的修改能同步進來）
  setInterval(async () => {
    try {
      const data = await fbGet();
      if (!data) return;
      books = (data.books || []).map(b => ({...b, open: false}));
      if (data.goals && typeof data.goals === 'object') goals = data.goals;
      if (data.nextId) nextId = data.nextId;
      setSyncStatus('ok', '已同步');
      render();
    } catch(e) { /* 靜默失敗，不打擾使用者 */ }
  }, 30000);
}

// 貼上圖片（截圖或複製的圖片檔）→ 轉成 base64 顯示
document.addEventListener('paste', function(e) {
  if (!document.getElementById('modalOverlay').classList.contains('open')) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('f-cover').value = ev.target.result;
        previewCover();
      };
      reader.readAsDataURL(file);
      break;
    }
  }
});

// ── 多選下拉選單 ─────────────────────────────────────────────────
function allLocOptions() {
  const s = new Set();
  books.forEach(b => (b.locations||[]).forEach(l => s.add(l)));
  currentLocs.forEach(l => s.add(l));
  return [...s].sort();
}
function allTagOptions() {
  const s = new Set();
  books.forEach(b => (b.tags||[]).forEach(t => s.add(t)));
  currentTags.forEach(t => s.add(t));
  return [...s].sort();
}

function focusInput(id) { document.getElementById(id)?.focus(); }

function renderMsSelected(type) {
  const arr = type==='loc' ? currentLocs : currentTags;
  const cls = type==='loc' ? 'chip-loc' : 'chip-tag';
  document.getElementById(`${type}-selected`).innerHTML = arr.map(v =>
    `<span class="chip ${cls}">${v}<span class="rm" onmousedown="event.preventDefault();msRemove('${type}','${v}')">×</span></span>`
  ).join('');
}

function renderMsDropdown(type) {
  const q = document.getElementById(`${type}-inp`).value.trim().toLowerCase();
  const opts = type==='loc' ? allLocOptions() : allTagOptions();
  const selected = type==='loc' ? currentLocs : currentTags;
  const filtered = q ? opts.filter(o => o.toLowerCase().includes(q)) : opts;
  const dd = document.getElementById(`${type}-dropdown`);
  const showAdd = q && !opts.some(o => o.toLowerCase()===q);
  dd.innerHTML =
    filtered.map(o => `<div class="ms-opt${selected.includes(o)?' selected':''}" onmousedown="event.preventDefault();msToggle('${type}','${o}')">
      <span class="ms-opt-check">${selected.includes(o)?'✓':''}</span>${o}
    </div>`).join('') +
    `<div class="ms-add-row" id="${type}-add-row" style="${showAdd?'display:block':'display:none'}" onmousedown="event.preventDefault();msAdd('${type}','${q}')">+ 新增「${q}」</div>`;
  dd.classList.add('open');
}

function closeMsDropdown(type) {
  document.getElementById(`${type}-dropdown`).classList.remove('open');
  document.getElementById(`${type}-inp`).value = '';
}

function msToggle(type, val) {
  const arr = type==='loc' ? currentLocs : currentTags;
  const idx = arr.indexOf(val);
  if (idx>=0) arr.splice(idx,1); else arr.push(val);
  renderMsSelected(type);
  renderMsDropdown(type);
}

function msRemove(type, val) {
  if (type==='loc') currentLocs = currentLocs.filter(x=>x!==val);
  else currentTags = currentTags.filter(x=>x!==val);
  renderMsSelected(type);
}

function msAdd(type, val) {
  val = val.trim(); if (!val) return;
  const arr = type==='loc' ? currentLocs : currentTags;
  if (!arr.includes(val)) arr.push(val);
  renderMsSelected(type);
  document.getElementById(`${type}-inp`).value = '';
  renderMsDropdown(type);
}

function msPressKey(e, type) {
  if (e.key==='Enter') { e.preventDefault(); const v=document.getElementById(`${type}-inp`).value.trim(); if(v) msAdd(type,v); }
  if (e.key==='Escape') closeMsDropdown(type);
}

// 點選外部關閉下拉
document.addEventListener('click', function(e) {
  ['loc','tag'].forEach(type => {
    const wrap = document.getElementById(`${type}-inp`)?.closest('.field');
    if (wrap && !wrap.contains(e.target)) closeMsDropdown(type);
  });
});

// ── 書架渲染 ────────────────────────────────────────────────────
function filtered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return books.filter(b => {
    const mf = activeFilter === 'all' || b.status === activeFilter;
    const mr = activeRating === 0 || b.rating === activeRating;
    const mt = !activeTag || (b.tags && b.tags.includes(activeTag));
    const mn = !activeNoteFilter || (b.noteStatus||'') === activeNoteFilter;
    const ml = !activeLocFilter || (b.locations && b.locations.includes(activeLocFilter));
    const ms = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || (b.isbn && b.isbn.includes(q));
    return mf && mr && mt && mn && ml && ms;
  });
}

  if(!t||t<1){alert('請輸入目標本數');return;}
  goals[y]=t; activeGoalYear=y;
  document.getElementById('newGoalYear').value=''; document.getElementById('newGoalTarget').value='';
  scheduleSave(); renderGoalSection();
}
function removeGoalYear(y) {
  delete goals[y]; const yrs=Object.keys(goals).map(Number);
  activeGoalYear=yrs.length?Math.max(...yrs):THIS_YEAR;
  if(!goals[activeGoalYear])goals[activeGoalYear]=50;
  scheduleSave(); renderGoalSection();
}

function renderPieStatusTabs() {
  const opts = [['all','全部'],['pending','待讀'],['reading','閱讀中'],['done','已讀'],['dropped','棄讀']];
  document.getElementById('pieStatusTabs').innerHTML = opts.map(([v,l]) =>
    `<button class="status-tab${activePieStatus===v?' active':''}" onclick="setPieStatus('${v}')">${l}</button>`).join('');
}
function setPieStatus(s) { activePieStatus=s; renderPie(); }
function renderPie() {
  const f = activePieStatus==='all' ? books : books.filter(b => b.status===activePieStatus);
  const tagCount = {};
  f.forEach(b => (b.tags||[]).forEach(t => { tagCount[t]=(tagCount[t]||0)+1; }));
  const entries = Object.entries(tagCount).sort((a,b) => b[1]-a[1]);
  if (!entries.length) {
    document.getElementById('pieLegend').innerHTML = `<span style="font-size:13px;color:#aaa">此狀態下無標籤資料</span>`;
    if(pieChartInst){pieChartInst.destroy();pieChartInst=null;} return;
  }
  const labels=entries.map(e=>e[0]), data=entries.map(e=>e[1]), total=data.reduce((a,b)=>a+b,0);
  document.getElementById('pieLegend').innerHTML = labels.map((l,i) =>
    `<span style="display:flex;align-items:center;gap:4px"><span class="legend-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></span>${l} ${Math.round(data[i]/total*100)}%</span>`).join('');
  if(pieChartInst) pieChartInst.destroy();
  pieChartInst = new Chart(document.getElementById('pieChart'), {type:'doughnut',
    data:{labels, datasets:[{data, backgroundColor:labels.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]), borderWidth:2, borderColor:'#ffffff'}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} 本`}}}}});
}
function renderBarYearTabs() {
  const years=doneYears(); if(!years.length){document.getElementById('barYearTabs').innerHTML='';return;}
  if(!years.includes(activeBarYear)) activeBarYear=years[0];
  document.getElementById('barYearTabs').innerHTML = years.map(y =>
    `<button class="year-tab${activeBarYear===y?' active':''}" onclick="setBarYear(${y})">${y}</button>`).join('');
}
function setBarYear(y) { activeBarYear=y; renderBar(); }
function renderBar() {
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const counts=Array(12).fill(0);
  books.filter(b=>b.status==='done'&&b.finishedDate&&b.finishedDate.startsWith(activeBarYear+'')).forEach(b=>{counts[parseInt(b.finishedDate.split('-')[1])-1]++;});
  if(barChartInst) barChartInst.destroy();
  barChartInst = new Chart(document.getElementById('barChart'), {type:'bar',
    data:{labels:months, datasets:[{data:counts, backgroundColor:'#534AB7', borderRadius:4, borderSkipped:false}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.raw} 本`}}},
      scales:{x:{grid:{display:false},ticks:{autoSkip:false,font:{size:11}}}, y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}}}}});
}

// ── 分頁切換 ────────────────────────────────────────────────────
function showTab(tab) {

// ── Modal ───────────────────────────────────────────────────────
function openModal(b=null) {
  editingId = b ? b.id : null;
  document.getElementById('modalTitle').textContent = b ? '編輯書籍' : '新增書籍';
  document.getElementById('f-title').value     = b ? b.title : '';
  document.getElementById('f-author').value    = b ? b.author : '';
  document.getElementById('f-year').value      = b ? b.year : '';
  document.getElementById('f-publisher').value = b ? b.publisher : '';
  document.getElementById('f-isbn').value      = b ? b.isbn : '';
  document.getElementById('f-cover').value     = b ? (b.cover||'') : '';
  document.getElementById('f-status').value    = b ? b.status : 'pending';
  document.getElementById('f-date').value      = b ? b.finishedDate : '';
  document.getElementById('f-rating').value    = b ? b.rating : '0';
  document.getElementById('f-note').value      = b ? b.note : '';
  document.getElementById('f-evernote').value  = b ? (b.evernote||'') : '';
  document.getElementById('f-note-status').value = b ? (b.noteStatus||'') : '';
  currentTags = b ? [...(b.tags||[])] : [];
  currentLocs = b ? [...(b.locations||[])] : [];
  renderMsSelected('loc'); renderMsSelected('tag'); previewCover(); toggleDateField();
  document.getElementById('isbnStatus').textContent = '';
  document.getElementById('modalOverlay').classList.add('open');
}
function editBook(id) { openModal(books.find(b => b.id===id)); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId=null; }

// ── ISBN 自動查詢（依序嘗試多個資料庫）────────────────────────
async function lookupISBN() {
  const isbn = document.getElementById('f-isbn').value.trim().replace(/[-\s]/g,'');
  if (!isbn) { alert('請先輸入 ISBN'); return; }
  const btn = document.getElementById('isbnBtn');
  const status = document.getElementById('isbnStatus');
  btn.textContent='查詢中…'; btn.disabled=true;
  status.style.color='#185FA5'; status.textContent='正在查詢書籍資料…';

  // 嘗試順序：1. Google Books（繁中最佳）2. Open Library（英文書補充）
  let found = false;

  // ── 1. Google Books API ──
  try {
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&langRestrict=zh`);
    const json = await res.json();
    if (json.totalItems > 0 && json.items?.[0]?.volumeInfo) {
      const info = json.items[0].volumeInfo;
      if (info.title) document.getElementById('f-title').value = info.title;
      if (info.authors?.length) document.getElementById('f-author').value = info.authors.join('、');
      if (info.publishedDate) document.getElementById('f-year').value = info.publishedDate.slice(0,4);
      if (info.publisher) document.getElementById('f-publisher').value = info.publisher;
      if (info.imageLinks && !document.getElementById('f-cover').value) {
        const raw = info.imageLinks.thumbnail || info.imageLinks.smallThumbnail || '';
        if (raw) {
          // 統一處理各種格式：http://、https://、// 開頭
          let cleanCover = raw;
          if (cleanCover.startsWith('//')) cleanCover = 'https:' + cleanCover;
          else cleanCover = cleanCover.replace(/^http:\/\//, 'https://');
          cleanCover = cleanCover.replace('&edge=curl', '');
          document.getElementById('f-cover').value = cleanCover;
          previewCover();
        }
      }
      status.style.color='#3B6D11';
      status.textContent=`已從 Google Books 找到資料，請確認後儲存。`;
      found = true;
    }
  } catch(e) { /* Google Books 失敗，繼續嘗試下一個 */ }

  // ── 2. Open Library（Google Books 找不到時備用）──
  if (!found) {
    try {
      status.textContent='Google Books 找不到，嘗試 Open Library…';
      const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
      const json = await res.json();
      const key = `ISBN:${isbn}`;
      if (json[key]) {
        const book = json[key];
        if (book.title) document.getElementById('f-title').value = book.title;
        if (book.authors?.length) document.getElementById('f-author').value = book.authors.map(a=>a.name).join('、');
        if (book.publish_date) document.getElementById('f-year').value = book.publish_date.match(/\d{4}/)?.[0] || '';
        if (book.publishers?.length) document.getElementById('f-publisher').value = book.publishers.map(p=>p.name).join('、');
        if (book.cover?.medium && !document.getElementById('f-cover').value) {
          document.getElementById('f-cover').value = book.cover.medium; previewCover();
        }
        status.style.color='#3B6D11';
        status.textContent='已從 Open Library 找到資料，請確認後儲存。';
        found = true;
      }
    } catch(e) { /* Open Library 也失敗 */ }
  }

  if (!found) {
    status.style.color='#A32D2D';
    status.textContent='兩個資料庫都找不到此書，請手動填寫。';
  }

  btn.textContent='查詢'; btn.disabled=false;
}

// ── 儲存書籍 ────────────────────────────────────────────────────
function saveBook() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('請輸入書名'); return; }
  const status = document.getElementById('f-status').value;
  const data = {
    title, author: document.getElementById('f-author').value.trim(),
    year: document.getElementById('f-year').value.trim(),
    publisher: document.getElementById('f-publisher').value.trim(),
    isbn: document.getElementById('f-isbn').value.trim(),
    cover: document.getElementById('f-cover').value.trim(),
    status, finishedDate: status==='done' ? document.getElementById('f-date').value : '',
    locations: [...currentLocs],
    rating: parseInt(document.getElementById('f-rating').value),
    note: document.getElementById('f-note').value.trim(),
    evernote: document.getElementById('f-evernote').value.trim(),
    noteStatus: document.getElementById('f-note-status').value,
    tags: [...currentTags], open: false
  };
  if (editingId) books = books.map(b => b.id===editingId ? {...b,...data} : b);
  else books.push({id: nextId++, ...data});
  scheduleSave(); closeModal(); render();
}

// ── 匯出 / 匯入 ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportData() {
  const payload = {books, goals, nextId, exportedAt: new Date().toISOString()};
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`bookshelf-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('已匯出備份檔案');
}

function importData(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.books)) throw new Error('格式錯誤');
      if (!confirm(`確定要匯入？這將取代目前所有書籍資料（共 ${data.books.length} 本）。`)) { event.target.value=''; return; }
      books = data.books.map(b => ({...b, open:false}));
      if (data.goals && typeof data.goals==='object') goals = data.goals;
      if (data.nextId) nextId = data.nextId;
      activeFilter='all'; activeRating=0; activeTag=''; activeNoteFilter=''; activeLocFilter='';
      await saveToFirebase(); render();
      showToast(`成功匯入 ${books.length} 本書`);
    } catch(err) { alert('匯入失敗：請使用本書架匯出的 JSON 檔案。'); }
    event.target.value='';
  };
  reader.readAsText(file);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

// ── 啟動：顯示登入畫面，並預載 Auth SDK 以自動恢復登入 ──────────
document.getElementById('loginScreen').style.display = 'block';
document.getElementById('tabShelf').style.display = 'none';
document.getElementById('tabDash').style.display = 'none';
setSyncStatus('ing', '請先登入');

// 預載 Firebase Auth SDK，自動恢復上次登入狀態
const loadScript = src => new Promise((resolve, reject) => {
  if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
  const s = document.createElement('script');
  s.src = src; s.onload = resolve; s.onerror = reject;
  document.head.appendChild(s);
});
Promise.all([
  loadScript('https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js'),
  loadScript('https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js')
]).then(() => {
  // SDK 載入完成，初始化並嘗試自動恢復登入
  if (!fbAuthApp) {
    fbAuthApp = firebase.initializeApp({
      apiKey: FB_API_KEY,
      authDomain: 'my-bookshelf-a66cb.firebaseapp.com',
      projectId: FB_PROJECT
    }, 'auth-app');
  }
  const auth = firebase.auth(fbAuthApp);
  auth.onAuthStateChanged(user => {
    if (user) {
      user.getIdToken().then(token => {
        currentIdToken = token;
        onSignedIn(user.displayName || user.email, token, auth);
      });
    }
    // 未登入維持登入畫面
  });
}).catch(() => {
  // SDK 載入失敗不影響手動點登入按鈕
});
</script>
